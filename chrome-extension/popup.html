<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QuizPilot</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <main class="popup">
    <header class="header">
      <h1>QuizPilot</h1>
      <p>Study-only MCQ assistant</p>
    </header>

    <section class="status-card">
      <p><strong>Account:</strong> <span id="authStatus">Not signed in</span></p>
      <p><strong>Credits:</strong> <span id="creditsText">-</span></p>
      <div class="actions">
        <button id="signInBtn" class="btn btn-primary">Sign in with Google</button>
        <button id="signOutBtn" class="btn">Sign out</button>
      </div>
    </section>

    <section class="actions">
      <button id="scanBtn" class="btn btn-primary">Scan All Questions</button>
      <button id="highlightBtn" class="btn">Get AI Answers (All)</button>
    </section>

    <section class="status-card">
      <p><strong>Detected questions:</strong> <span id="questionCount">0</span></p>
    </section>

    <label class="toggle-row" for="autoHighlightToggle">
      <input type="checkbox" id="autoHighlightToggle" />
      <span>Auto-show after scan</span>
    </label>

    <section class="status-card" id="statusCard" aria-live="polite">
      <p id="statusText">Ready.</p>
    </section>

    <footer class="footer">
      <small>Only use in user-authorized study environments.</small>
    </footer>
  </main>

  <script src="config.js"></script>
  <script src="popup.js"></script>
</body>
</html>
